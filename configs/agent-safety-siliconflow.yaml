# KDNA Lab — Agent Safety Eval Config (SiliconFlow / DeepSeek V4-Pro)

domain:
  name: "@aikdna/agent_safety"
  load_cmd: "kdna load"
  format: "prompt"

api:
  provider: "openai_compatible"
  model: "deepseek-ai/DeepSeek-V4-Pro"
  base_url: "https://api.siliconflow.cn/v1"
  api_key_env: "SILICONFLOW_API_KEY"
  temperature: 0.3
  max_tokens: 4000
  timeout: 45

output:
  dir: "benchmarks/reference-domains/agent_safety/2026-06-03"

runners:
  domain:
    conditions:
      - "no_kdna"
      - "best_prompt"
      - "kdna_full"
    rate_limit: 1.5
    retries: 1
    workers: 1
