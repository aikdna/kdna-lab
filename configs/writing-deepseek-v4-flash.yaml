domain:
  name: "@aikdna/writing"
  load_cmd: "kdna load"
  format: "prompt"

api:
  provider: "openai_compatible"
  model: "deepseek/deepseek-v4-flash"
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.3
  max_tokens: 2000
  timeout: 30

output:
  dir: "benchmarks/reference-domains/writing/2026-06-03/cross-model/deepseek-v4-flash"

runners:
  domain:
    conditions:
      - "no_kdna"
      - "best_prompt"
      - "kdna_full"
    rate_limit: 0.5
    retries: 1
    workers: 1
