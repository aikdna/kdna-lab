# KDNA Lab Configuration

domain:
  name: "@aikdna/writing"
  load_cmd: "kdna load"
  format: "prompt"

# Default API config — OpenRouter, DeepSeek V4 Pro
api:
  provider: "openai_compatible"
  model: "deepseek/deepseek-v4-pro"
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.3
  max_tokens: 4000
  timeout: 60

output:
  dir: "outputs"

runners:
  domain:
    conditions:
      - "no_kdna"
      - "best_prompt"
      - "kdna_full"
    rate_limit: 0.5
    workers: 1
  cli:
    timeout: 30
  cross_model:
    rate_limit: 0.5
    workers: 1

# Cross-model tiers for comparison experiments
models:
  # Tier 3: Strongest (论文对比用)
  - id: claude-opus-4.7
    provider: openai_compatible
    model: anthropic/claude-opus-4.7
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: OPENROUTER_API_KEY

  # Tier 2: 主力实验
  - id: deepseek-v4-pro
    provider: openai_compatible
    model: deepseek/deepseek-v4-pro
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: OPENROUTER_API_KEY

  # Tier 1: 中等模型 (移植性验证)
  - id: qwen-3.7-max
    provider: openai_compatible
    model: qwen/qwen3.7-max
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: OPENROUTER_API_KEY
