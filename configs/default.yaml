# KDNA Lab Configuration

domain:
  name: "@aikdna/writing"
  load_cmd: "kdna load"
  format: "prompt"

# Default API config — OpenRouter (tested and working)
api:
  provider: "openai_compatible"
  model: "deepseek/deepseek-chat"
  base_url: "https://openrouter.ai/api/v1"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.3
  max_tokens: 4000

output:
  dir: "outputs"

runners:
  domain:
    conditions:
      - "kdna_full"
    rate_limit: 0.5
    workers: 1
  cli:
    timeout: 30
  cross_model:
    rate_limit: 0.5
    workers: 1

# Cross-model tiers for comparison experiments
models:
  # Tier 3: Strong (论文对比用)
  - id: claude-opus-4.7
    provider: openai_compatible
    model: anthropic/claude-opus-4.7
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: OPENROUTER_API_KEY

  # Tier 2: Medium (主力实验)
  - id: deepseek-v3
    provider: openai_compatible
    model: deepseek/deepseek-chat
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: OPENROUTER_API_KEY

  # Tier 1: Weak/budget (移植性验证)
  - id: gemini-flash
    provider: openai_compatible
    model: google/gemini-3.5-flash
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: OPENROUTER_API_KEY
