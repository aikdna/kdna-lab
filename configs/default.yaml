# KDNA Lab Configuration

domain:
  name: "@aikdna/kdna_propagation"
  load_cmd: "kdna load"
  format: "prompt"

api:
  provider: "openai"
  model: "gpt-4o"
  base_url: null
  api_key_env: "OPENAI_API_KEY"
  temperature: 0.3
  max_tokens: 4000

output:
  dir: "outputs"

runners:
  domain:
    conditions:
      - "kdna_full"
    rate_limit: 0.5
  cli:
    timeout: 30
