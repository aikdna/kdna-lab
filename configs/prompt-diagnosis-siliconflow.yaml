# KDNA Lab — Prompt Diagnosis Eval Config (SiliconFlow / DeepSeek V4-Pro)

domain:
  name: "@aikdna/prompt_diagnosis"
  load_cmd: "kdna load"
  format: "prompt"

api:
  provider: "openai_compatible"
  model: "deepseek-ai/DeepSeek-V4-Pro"
  base_url: "https://api.siliconflow.cn/v1"
  api_key_env: "SILICONFLOW_API_KEY"
  temperature: 0.3
  max_tokens: 4000
  timeout: 60

output:
  dir: "outputs/prompt_diagnosis"

runners:
  domain:
    conditions:
      - "no_kdna"
      - "best_prompt"
      - "kdna_full"
    rate_limit: 0.5
    workers: 1
